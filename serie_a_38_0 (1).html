<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serie A 38-0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0d0d0d;color:#f0f0f0;min-height:100vh}
:root{
  --navy:#0a0e1a;--navy3:#1e2d40;
  --gold:#f0c040;--gold2:#d4a017;
  --border:rgba(255,255,255,0.1);
  --bg2:rgba(255,255,255,0.05);--bg3:rgba(255,255,255,0.09);
}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#0a0e1a,#111827 60%,#1e2d40);padding:1rem 1.25rem .6rem;text-align:center;border-bottom:.5px solid var(--border)}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:4px;color:#fff}
.hdr-title span{color:var(--gold)}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.hdr-pills{display:flex;justify-content:center;gap:8px;margin-top:.5rem}
.pill{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:500;text-transform:uppercase}
.pill-g{background:rgba(22,163,74,.2);color:#4ade80}
.pill-mode{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:500;text-transform:uppercase}
.pill-scouting{background:rgba(56,189,248,.15);color:#7dd3fc}
.pill-memoria{background:rgba(251,113,133,.15);color:#fda4af}

/* ── LANG BAR ── */
.lang-bar{display:flex;justify-content:center;gap:6px;padding:.5rem;background:rgba(0,0,0,.3);border-bottom:.5px solid var(--border)}
.lang-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500;background:none;border:.5px solid rgba(255,255,255,.12);cursor:pointer;color:rgba(255,255,255,.4);transition:all .15s}
.lang-btn:hover{background:var(--bg3);color:#fff}
.lang-btn.active{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.3)}

.container{max-width:960px;margin:0 auto;padding:1.25rem}
.screen{display:none}.screen.active{display:block}

/* ── MODE SELECT ── */
.mode-intro{text-align:center;padding:.75rem 0 1.1rem}
.mode-intro p{font-size:13px;color:rgba(255,255,255,.5);line-height:1.6;max-width:520px;margin:0 auto}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem}
.mode-card{background:var(--bg2);border:.5px solid var(--border);border-radius:12px;padding:1.25rem;cursor:pointer;transition:all .2s;text-align:center}
.mode-card:hover{transform:translateY(-3px)}
.mode-card.scouting:hover{border-color:rgba(56,189,248,.4);background:rgba(56,189,248,.05)}
.mode-card.memoria:hover{border-color:rgba(251,113,133,.4);background:rgba(251,113,133,.05)}
.mode-icon{font-size:2.2rem;margin-bottom:.6rem}
.mode-name{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:2px;margin-bottom:.35rem}
.mode-card.scouting .mode-name{color:#7dd3fc}
.mode-card.memoria .mode-name{color:#fda4af}
.mode-desc{font-size:12px;color:rgba(255,255,255,.45);line-height:1.5;margin-bottom:.8rem}
.mode-rules{list-style:none;text-align:left;font-size:11px;color:rgba(255,255,255,.35);display:flex;flex-direction:column;gap:4px;margin-bottom:.9rem}
.mode-rules li::before{content:'▸ '}
.mode-card.scouting .mode-rules li::before{color:#7dd3fc}
.mode-card.memoria .mode-rules li::before{color:#fda4af}
.mode-btn{width:100%;padding:.55rem;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;border:none;border-radius:7px;cursor:pointer;transition:all .15s}
.mode-card.scouting .mode-btn{background:rgba(56,189,248,.15);color:#7dd3fc}
.mode-card.scouting .mode-btn:hover{background:rgba(56,189,248,.28)}
.mode-card.memoria .mode-btn{background:rgba(251,113,133,.15);color:#fda4af}
.mode-card.memoria .mode-btn:hover{background:rgba(251,113,133,.28)}
.diff-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;margin-bottom:.6rem}
.diff-n{background:rgba(56,189,248,.12);color:#7dd3fc}
.diff-h{background:rgba(251,113,133,.15);color:#fda4af}

/* ── ROLL SCREEN — 3-col layout ── */
.roll-layout{display:grid;grid-template-columns:220px 1fr 260px;gap:1rem;align-items:start}

/* left panel */
.left-panel{display:flex;flex-direction:column;gap:.75rem}
.panel-box{background:var(--bg2);border:.5px solid var(--border);border-radius:10px;padding:.85rem}
.panel-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.35);margin-bottom:.6rem;font-weight:500}

/* formation grid */
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.form-btn{padding:.45rem .3rem;font-size:12px;font-weight:600;background:var(--bg3);border:.5px solid var(--border);border-radius:6px;cursor:pointer;color:rgba(255,255,255,.5);transition:all .15s;text-align:center}
.form-btn:hover{background:rgba(240,192,64,.1);color:#fff}
.form-btn.active{background:rgba(240,192,64,.18);border-color:var(--gold2);color:var(--gold)}

/* mode diff buttons */
.mode-diff-row{display:flex;gap:6px}
.diff-btn{flex:1;padding:.45rem;font-size:12px;font-weight:500;background:var(--bg3);border:.5px solid var(--border);border-radius:6px;cursor:pointer;color:rgba(255,255,255,.45);transition:all .15s;text-align:center}
.diff-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.diff-btn.active-scout{background:rgba(56,189,248,.15);border-color:rgba(56,189,248,.4);color:#7dd3fc}
.diff-btn.active-mem{background:rgba(251,113,133,.15);border-color:rgba(251,113,133,.4);color:#fda4af}

/* reroll pips */
.reroll-pips-row{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.35);margin-top:.5rem}
.pip{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.12);transition:all .2s;flex-shrink:0}
.pip.avail.scouting{background:#7dd3fc}
.pip.avail.memoria{background:#fda4af}

/* dice button */
.dice-btn{width:100%;padding:.9rem;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;background:#c0392b;color:#fff;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .2s;margin-top:.5rem}
.dice-btn:hover:not(:disabled){background:#e74c3c;transform:translateY(-2px)}
.dice-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.dice-face{font-size:1.6rem}
@keyframes spin{0%{transform:rotate(0) scale(1.3)}50%{transform:rotate(180deg) scale(.8)}100%{transform:rotate(360deg) scale(1)}}
.rolling .dice-face{animation:spin .5s ease-out}

/* ── PITCH ── */
.pitch-wrap{position:relative;background:#1a5c1a;border-radius:10px;overflow:hidden;aspect-ratio:3/4;min-height:420px;width:100%}
.pitch-lines{position:absolute;inset:0;pointer-events:none}
/* grass stripes */
.pitch-wrap::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 36px,rgba(0,0,0,.07) 36px,rgba(0,0,0,.07) 72px)}
.pitch-slot{position:absolute;transform:translate(-50%,-50%);cursor:pointer;transition:all .2s;z-index:2}
.pitch-slot .p-circle{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.12);border:2px dashed rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:rgba(255,255,255,.6);margin:0 auto 3px;transition:all .2s;letter-spacing:.5px}
.pitch-slot .p-name{font-size:9px;color:rgba(255,255,255,.55);text-align:center;white-space:nowrap;max-width:54px;overflow:hidden;text-overflow:ellipsis}
.pitch-slot.next-pick .p-circle{border-style:solid;border-color:var(--gold);background:rgba(240,192,64,.1);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(240,192,64,.4)}50%{box-shadow:0 0 0 8px rgba(240,192,64,0)}}
.pitch-slot.filled .p-circle{border-style:solid;border-color:#fff;background:rgba(255,255,255,.25);color:#fff;font-size:9px}
.pitch-slot.filled{cursor:default}
.pitch-slot.slot-target .p-circle{border-style:solid;border-color:#4ade80;border-width:3px;background:rgba(74,222,128,.25);animation:pulseGreen 1s infinite;cursor:pointer}
@keyframes pulseGreen{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.6)}50%{box-shadow:0 0 0 12px rgba(74,222,128,0)}}
.pitch-slot.slot-empty .p-circle{border-style:dashed;border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.04)}
.player-row.selected-player{background:rgba(240,192,64,.18);border-left:3px solid var(--gold)}
@media(max-width:700px){
  .pitch-slot.slot-target .p-circle{border-width:3px;width:46px;height:46px}
  .pitch-slot.slot-target .p-name{font-size:9px;font-weight:700;color:#4ade80}
}
/* corner flags */
.corner{position:absolute;width:8px;height:8px;border-radius:1px;background:rgba(255,255,255,.3)}
.corner.tl{top:4px;left:4px}.corner.tr{top:4px;right:4px}
.corner.bl{bottom:4px;left:4px}.corner.br{bottom:4px;right:4px}

/* ── RIGHT PANEL (team reveal + box score) ── */
.right-panel{display:flex;flex-direction:column;gap:.75rem}
.team-reveal-box{background:var(--bg2);border:.5px solid var(--border);border-radius:10px;overflow:hidden;display:none}
.team-hdr{padding:.65rem .85rem;display:flex;align-items:center;gap:.6rem;border-bottom:.5px solid var(--border)}
.team-crest{font-size:1.6rem;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);border-radius:7px;flex-shrink:0}
.team-info h3{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:1px;color:#fff;line-height:1.1}
.team-info p{font-size:10px;color:rgba(255,255,255,.4)}
.era-tag{margin-left:auto;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;background:rgba(240,192,64,.12);color:var(--gold2);white-space:nowrap}
.players-list{overflow:hidden}
.player-row{display:flex;align-items:center;gap:.5rem;padding:.5rem .85rem;border-bottom:.5px solid var(--border);cursor:pointer;transition:background .12s}
.player-row:last-child{border-bottom:none}
.player-row:hover{background:rgba(240,192,64,.07)}
.player-row.picked-already{opacity:.28;pointer-events:none}
.player-row.is-needed{background:rgba(240,192,64,.04)}
.p-info{flex:1}
.p-name{font-size:12px;font-weight:500;color:#f0f0f0}
.p-pos{font-size:10px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.4px}
.p-rating{font-family:'Bebas Neue',sans-serif;font-size:.9rem;padding:2px 6px;border-radius:4px;flex-shrink:0}
.r-elite{background:rgba(240,192,64,.15);color:var(--gold)}
.r-good{background:rgba(22,163,74,.15);color:#4ade80}
.r-ok{background:rgba(255,255,255,.08);color:rgba(255,255,255,.45)}
.r-hidden{background:rgba(255,255,255,.05);color:rgba(255,255,255,.18);letter-spacing:2px}
.pick-hint-bar{padding:.5rem .85rem;font-size:11px;color:rgba(255,255,255,.38);border-top:.5px solid var(--border);background:rgba(0,0,0,.15)}
.reroll-bar{padding:.4rem .85rem .6rem;display:flex;gap:8px}
.reroll-team-btn{padding:.38rem .8rem;font-size:11px;font-weight:500;background:none;border:.5px solid rgba(255,255,255,.18);border-radius:6px;cursor:pointer;color:rgba(255,255,255,.45);transition:all .15s}
.reroll-team-btn:hover:not(:disabled){background:var(--bg3);color:#fff}
.reroll-team-btn:disabled{opacity:.28;cursor:not-allowed}

/* box score */
.box-score{background:var(--bg2);border:.5px solid var(--border);border-radius:10px;padding:.75rem}
.box-score-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.35);margin-bottom:.6rem;font-weight:500}
.bs-row{display:flex;align-items:center;gap:.5rem;padding:.3rem 0;border-bottom:.5px solid rgba(255,255,255,.05)}
.bs-row:last-child{border-bottom:none}
.bs-pos{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.3);min-width:28px}
.bs-bar-wrap{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.bs-bar{height:100%;border-radius:2px;background:rgba(255,255,255,.18);transition:width .4s ease}
.bs-bar.atk{background:linear-gradient(90deg,#e74c3c,#f39c12)}
.bs-bar.def{background:linear-gradient(90deg,#2c3e50,#7f8c8d)}
.bs-name{font-size:11px;color:#f0f0f0;min-width:72px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bs-val{font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:rgba(255,255,255,.3);min-width:22px;text-align:right}
.bs-val.show{color:var(--gold)}
.memoria-warn{background:rgba(251,113,133,.08);border:.5px solid rgba(251,113,133,.22);border-radius:7px;padding:.55rem .75rem;font-size:11px;color:#fda4af;display:none;align-items:center;gap:.4rem}

/* ── FORMATION screen ── */
.form-ready-layout{display:grid;grid-template-columns:1fr 220px;gap:1rem;align-items:start}
.avg-card{background:var(--bg2);border:.5px solid var(--border);border-radius:10px;padding:.85rem;margin-bottom:.75rem}
.avg-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.avg-label{font-size:12px;color:rgba(255,255,255,.45)}
.avg-val{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;color:var(--gold)}
.avg-track{height:5px;background:rgba(255,255,255,.07);border-radius:3px}
.avg-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:3px}

/* ── LEAGUE ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.stat-c{background:var(--bg2);border-radius:8px;padding:.6rem;text-align:center;border:.5px solid var(--border)}
.stat-v{font-family:'Bebas Neue',sans-serif;font-size:1.55rem;line-height:1}
.stat-l{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.38);margin-top:2px}
.stat-c.win .stat-v{color:#4ade80}.stat-c.draw .stat-v{color:#fbbf24}.stat-c.loss .stat-v{color:#f87171}.stat-c.pts .stat-v{color:var(--gold)}
.tabs{display:flex;border:.5px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:1rem}
.tab{flex:1;padding:.5rem;font-size:12px;font-weight:500;text-align:center;cursor:pointer;background:none;border:none;color:rgba(255,255,255,.4);transition:all .12s}
.tab.active{background:var(--bg3);color:#fff}
.result-feed{max-height:280px;overflow-y:auto;border:.5px solid var(--border);border-radius:8px;margin-bottom:1rem;scrollbar-width:thin}
.result-item{display:grid;grid-template-columns:24px 1fr auto 1fr 24px;align-items:center;padding:.48rem .7rem;border-bottom:.5px solid var(--border);font-size:12px;gap:4px}
.result-item:last-child{border-bottom:none}
.ri-week{font-size:10px;color:rgba(255,255,255,.28);text-align:center}
.ri-home{text-align:right;font-weight:500}.ri-away{text-align:left}
.ri-score{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1rem;padding:2px 7px;border-radius:4px;white-space:nowrap}
.ri-score.win{background:rgba(22,163,74,.2);color:#4ade80}.ri-score.draw{background:rgba(251,191,36,.15);color:#fbbf24}.ri-score.loss{background:rgba(248,113,113,.15);color:#f87171}
.ri-out{text-align:center;font-size:11px}
.next-box{background:var(--bg2);border-radius:8px;border:.5px solid var(--border);padding:.6rem .85rem;font-size:12px;color:rgba(255,255,255,.45);margin-bottom:.7rem}
.next-box strong{color:#f0f0f0}
.league-table{width:100%;font-size:12px;border-collapse:collapse}
.league-table th{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.3);font-weight:500;padding:.38rem .45rem;border-bottom:.5px solid var(--border);text-align:left}
.league-table td{padding:.45rem .45rem;border-bottom:.5px solid var(--border)}
.league-table tr.my{background:rgba(240,192,64,.05)}.league-table tr.my td:first-child{border-left:2px solid var(--gold)}
.pts-col{font-family:'Bebas Neue',sans-serif;font-size:.92rem}
.pos-b{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;font-size:10px;font-weight:500}
.p1{background:rgba(240,192,64,.18);color:var(--gold2)}.p2{background:rgba(22,163,74,.15);color:#4ade80}.pbot{background:rgba(248,113,113,.15);color:#f87171}

/* ── BUTTONS ── */
.btn-main{width:100%;padding:.8rem;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;background:var(--navy);color:var(--gold);border:1.5px solid var(--gold2);border-radius:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:.5rem}
.btn-main:hover{background:var(--navy3);transform:translateY(-1px)}
.btn-sec{width:100%;padding:.6rem;font-size:13px;font-weight:500;background:none;color:rgba(255,255,255,.38);border:.5px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s}
.btn-sec:hover{background:var(--bg3);color:#fff}

/* ── END ── */
.end-hero{text-align:center;padding:1.25rem 0}
.end-trophy{font-size:3.5rem;margin-bottom:.6rem}
.end-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px}
.end-sub{font-size:13px;color:rgba(255,255,255,.45);margin:.2rem 0 1.1rem;line-height:1.5}
.end-record{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;padding:.7rem;background:var(--bg2);border-radius:8px;border:.5px solid var(--border);margin-bottom:.75rem;text-align:center}
.end-mode-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:.6rem}
.end-grade-wrap{text-align:center;margin-bottom:1.25rem}
.end-grade{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:4px;line-height:1}
.end-grade-lbl{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.35);margin-top:2px}
.grade-spp{color:#f0c040}.grade-sp{color:#fbbf24}.grade-a{color:#4ade80}.grade-b{color:#86efac}.grade-c{color:#94a3b8}.grade-d{color:#f87171}.grade-f{color:#ef4444}
.result-item{display:grid;grid-template-columns:24px 1fr auto 1fr 24px;align-items:start;padding:.48rem .7rem;border-bottom:.5px solid var(--border);font-size:12px;gap:4px}
.ri-scorers{font-size:10px;color:rgba(255,255,255,.32);margin-top:2px;grid-column:1/-1;padding-left:28px;line-height:1.4}

/* ── MOBILE ── */
@media(max-width:700px){
  .container{padding:.5rem}
  .hdr{padding:.6rem 1rem .4rem}
  .hdr-title{font-size:1.4rem;letter-spacing:2px}
  .mode-cards{grid-template-columns:1fr;gap:.75rem}

  /* Roll screen: stack verticale con flex */
  .roll-layout{
    display:flex !important;
    flex-direction:column !important;
    gap:.6rem
  }

  /* 1. Pannello sinistro (controlli) */
  .left-panel{width:100%;gap:.4rem}
  .panel-box{padding:.6rem}
  .form-grid{grid-template-columns:repeat(6,1fr)}
  .form-btn{padding:.3rem .1rem;font-size:10px}
  .mode-diff-row{gap:4px}
  .reroll-pips-row{margin-top:.3rem}
  .dice-btn{padding:.85rem;font-size:1.05rem;margin-top:.3rem}

  /* 2. Squadra */
  .right-panel{width:100%}
  .team-reveal-box{width:100%}
  .players-list{max-height:240px;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .player-row{padding:.6rem .75rem;min-height:48px}
  .p-name{font-size:13px}
  .p-rating{font-size:1rem;padding:3px 8px}
  .box-score{display:none}
  .pick-hint-bar{font-size:12px;padding:.5rem .75rem}

  /* 3. Campo — SEMPRE VISIBILE, dimensioni fisse esplicite */
  .pitch-wrap{
    display:block !important;
    width:100% !important;
    height:380px !important;
    min-height:380px !important;
    max-height:380px !important;
    aspect-ratio:unset !important
  }
  .pitch-slot .p-circle{width:38px;height:38px;font-size:9px}
  .pitch-slot .p-name{font-size:8px;max-width:44px}

  /* Formation confirm */
  .form-ready-layout{display:block}
  #pitch-preview{
    display:block !important;
    width:100% !important;
    height:380px !important;
    min-height:380px !important;
    max-height:380px !important;
    aspect-ratio:unset !important
  }

function getFormSlots(){return FORMATIONS[chosenForm]||FORMATIONS["4-3-3"];}

// Compatibilità ruoli: ogni ruolo del giocatore → quali tipi di slot può occupare.
// TER = terzino destro, TES = terzino sinistro, DC = centrale puro.
// Ruoli multipli separati da /  es. "TES/DC", "TER/ALA", "ALA/ATT"
// ATT puro → solo slot ATT. ALA puro → solo slot ALA. ALA/ATT → entrambi.
// TER/ALA → slot TER o ALA. TES/ALA → slot TES o ALA.
function playerRoles(p){ return p.pos.split('/'); }

function compatibleSlots(playerPos){
  const roles=playerPos.split('/');
  // mappa base: ogni ruolo singolo → quali slot accetta
  const base={
    POR: ['POR'],
    DC:  ['DC'],
    TER: ['TER'],
    TES: ['TES'],
    CDC: ['CDC','CEN'],
    CEN: ['CEN','CDC'],
    ALA: ['ALA'],        // ALA puro → solo ALA
    ATT: ['ATT']         // ATT puro → solo ATT
  };
  const result=new Set();
  roles.forEach(r=>{ (base[r]||[r]).forEach(s=>result.add(s)); });
  return [...result];
}
function isSlotFree(idx){ return !mySquad[idx]; }
function getFreeCompatibleSlots(playerPos){
  const slots=getFormSlots();
  const compat=compatibleSlots(playerPos);
  return slots.map((_,i)=>i).filter(i=>isSlotFree(i)&&compat.includes(slots[i].pos));
}

// pendingPlayer: il giocatore selezionato in attesa di essere piazzato su uno slot

function renderPitch(container){
  const wrap=container||document.getElementById('pitch-wrap');
  wrap.querySelectorAll('.pitch-slot').forEach(e=>e.remove());
  const slots=getFormSlots();
  const isPreview=!!container; // formazione finale, non interattiva

  // calcola quali slot sono target validi se c'è un giocatore pendente
  const targetIdxs=pendingPlayer?getFreeCompatibleSlots(pendingPlayer.pos):[];

  slots.forEach((s,i)=>{
    const filled=mySquad[i];
    const isPending=pendingPlayer&&targetIdxs.includes(i);
    const div=document.createElement('div');
    let cls='pitch-slot';
    if(filled) cls+=' filled';
    else if(isPending) cls+=' slot-target';
    else if(!isPreview&&!filled) cls+=' slot-empty';
    div.className=cls;
    div.style.left=s.x+'%';div.style.top=s.y+'%';
    const ini=filled?(filled.n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()):s.pos;
    div.innerHTML=`<div class="p-circle">${ini}</div><div class="p-name">${filled?filled.n:''}</div>`;
    if(!isPreview&&isPending){
      div.onclick=()=>placePlayer(i);
    }
    wrap.appendChild(div);
  });
}

function selectPlayerForPlacement(p, teamName, rowEl){
  if(mySquad.some(s=>s&&s.n===p.n)) return;
  const freeSlots=getFreeCompatibleSlots(p.pos);
  if(freeSlots.length===0){
    document.getElementById('pick-hint').textContent='⚠️ Nessuno slot compatibile libero per '+p.pos;
    return;
  }
  // Annulla eventuale selezione precedente
  pendingPlayer=null;
  pendingPlayer={...p, from:teamName.split(' ')[0]};
  // Evidenzia riga selezionata, deseleziona le altre
  document.querySelectorAll('.player-row').forEach(r=>r.classList.remove('selected-player'));

    if(pitch) setTimeout(()=>pitch.scrollIntoView({behavior:'smooth',block:'start'}),100);
  } // aggiorna il campo con gli slot verdi
}

function placePlayer(slotIdx){

  mySquad[slotIdx]=pendingPlayer;

function aggiornaDado(){

  const btn=document.getElementById('roll-btn');
  const face=document.getElementById('dice-face');
  const lbl=document.getElementById('roll-label');
  if(!btn) return;
  const max=gameMode==='scouting'?3:1;

  if(!dadoLanciato){

    btn.disabled=false;

    if(face) face.textContent='🎲';

    if(face) face.textContent='⛔';
    if(lbl) lbl.textContent='SCEGLI UN GIOCATORE';

function rollDice(){
  if(mySquad.filter(Boolean).length>=11) return;
  const max=gameMode==='scouting'?3:1;
  if(!dadoLanciato){

    eseguiLancio(true);
  } else if(slotRerolls<max){

    slotRerolls++;
    eseguiLancio(false);

  // Se rilanci esauriti non fa nulla (bottone già disabilitato)
}

function myStr(){const pl=mySquad.filter(Boolean);return pl.length?Math.round(pl.reduce((s,p)=>s+p.r,0)/pl.length*0.95):70;}
function buildTable(){
  tableData=[{name:'⭐ '+tr('myTeam'),str:myStr(),w:0,d:0,l:0,gf:0,ga:0,pts:0,me:true}];
  OPPONENTS.forEach(o=>tableData.push({...o,w:0,d:0,l:0,gf:0,ga:0,pts:0,me:false}));
  for(let r=0;r<4;r++){
    OPPONENTS.forEach((_,i)=>{
      const a=tableData[i+1],b=tableData[rng(1,OPPONENTS.length)];
      if(a===b)return;
      const{hg,ag}=simPair(a.str,b.str);
      a.gf+=hg;a.ga+=ag;b.gf+=ag;b.ga+=hg;
      if(hg>ag){a.w++;a.pts+=3;b.l++;}else if(hg===ag){a.d++;a.pts++;b.d++;b.pts++;}else{a.l++;b.w++;b.pts+=3;}
    });
  }
}
function simPair(sa,sb){
  const e=(sa-sb)/12;
  return{hg:Math.max(0,Math.min(7,Math.round(1.3*(1+e*.15)+(Math.random()>.45?rng(-1,2):0)))),ag:Math.max(0,Math.min(7,Math.round(1.3*(1-e*.15)+(Math.random()>.45?rng(-1,2):0))))};
}
function simMine(ms,os){
  const e=(ms-os)/10,wp=Math.max(.18,Math.min(.90,.54+e*.045)),dp=.18,r=Math.random();let hg,ag;
  if(r<wp){hg=rng(1,5);ag=rng(0,hg-1);}else if(r<wp+dp){hg=rng(0,2);ag=hg;}else{ag=rng(1,3);hg=rng(0,ag-1);}
  return{hg,ag};
}

  else{outcome='loss';ld.losses++;}
  const mt=tableData.find(x=>x.me);
  if(mt){mt.gf+=hg;mt.ga+=ag;if(hg>ag){mt.w++;mt.pts+=3;}else if(hg===ag){mt.d++;mt.pts++;}else mt.l++;}
  const ot=tableData.find(x=>x.name.includes(opp.name));
  if(ot){ot.gf+=ag;ot.ga+=hg;if(ag>hg){ot.w++;ot.pts+=3;}else if(hg===ag){ot.d++;ot.pts++;}else ot.l++;}
  const myScorers=getScorers(hg,mySquad,true);
  const oppScorers=getOppScorers(ag,opp.name);
  ld.matches.push({gw:ld.gw,opp:opp.name,hg,ag,outcome,myScorers,oppScorers});
  ld.gw++;
  renderFeed();updateStats();
  if(ld.gw<=38)updateNext();
  else{document.getElementById('next-area').style.display='none';setTimeout(endGame,600);}
}
function simulateAll(){while(ld.gw<=38)simulateMatch();}
function updateSimBtn(){const b=document.getElementById('sim-btn');if(b)b.innerHTML=tr('simMatch')+' <strong>'+(ld.gw||1)+'/38</strong>';}
function updateStats(){
  document.getElementById('s-w').textContent=ld.wins;document.getElementById('s-d').textContent=ld.draws;
  document.getElementById('s-l').textContent=ld.losses;document.getElementById('s-p').textContent=ld.pts;
  updateSimBtn();
}
function updateNext(){
  if(ld.gw>38)return;
  const opp=getOpp(ld.gw);const d=myStr()-opp.str;const fa=tr('favLbl');
  const fav=d>10?fa[0]:d>0?fa[1]:fa[2];
  document.getElementById('next-box').innerHTML=`<strong>${tr('matchDay')} ${ld.gw}/38</strong> — vs <strong>${opp.name}</strong> (${opp.str}) · ${fav}`;
  updateSimBtn();
}
function renderFeed(){
  const feed=document.getElementById('result-feed');feed.innerHTML='';
  [...ld.matches].reverse().forEach(m=>{
    const div=document.createElement('div');div.className='result-item';
    const icon=m.outcome==='win'?'✅':m.outcome==='draw'?'➖':'❌';
    const myS=m.myScorers&&m.myScorers.length?m.myScorers.join(', '):'';
    const opS=m.oppScorers&&m.oppScorers.length?m.oppScorers.join(', '):'';
    const scorersHtml=(myS||opS)?`<div class="ri-scorers">⚽ ${myS||'—'} &nbsp;|&nbsp; ${opS||'—'}</div>`:'';
    div.innerHTML=`<div class="ri-week">${m.gw}</div><div class="ri-home">${tr('myTeam')}</div><div class="ri-score ${m.outcome}">${m.hg} — ${m.ag}</div><div class="ri-away">${m.opp}</div><div class="ri-out">${icon}</div>${scorersHtml}`;
    feed.appendChild(div);
  });
}
function switchTab(tb){
  document.getElementById('tab-btn-r').classList.toggle('active',tb==='r');
  document.getElementById('tab-btn-t').classList.toggle('active',tb==='t');
  document.getElementById('tab-r').style.display=tb==='r'?'':'none';
  document.getElementById('tab-t').style.display=tb==='t'?'':'none';
  if(tb==='t')renderTable();
}
function renderTable(){
  const sorted=[...tableData].sort((a,b)=>b.pts-a.pts||((b.gf-b.ga)-(a.gf-a.ga)));
  const el=document.getElementById('table-el');
  const hdrs=tr('tblH');
  el.innerHTML=`<thead><tr>${hdrs.map(h=>`<th>${h}</th>`).join('')}</tr></thead>`;
  const tb=document.createElement('tbody');
  sorted.forEach((x,i)=>{
    const p=i+1,bc=p===1?'p1':p<=4?'p2':p>17?'pbot':'';
    const tr2=document.createElement('tr');if(x.me)tr2.className='my';
    tr2.innerHTML=`<td><span class="pos-b ${bc}">${p}</span></td><td>${x.name}</td><td>${x.w}</td><td>${x.d}</td><td>${x.l}</td><td class="pts-col">${x.pts}</td>`;
    tb.appendChild(tr2);
  });
  el.appendChild(tb);
}

// ── END ──
function endGame(){
  show('screen-end');
  const w=ld.wins,d=ld.draws,l=ld.losses;
  document.getElementById('e-w').textContent=w;document.getElementById('e-d').textContent=d;
  document.getElementById('e-l').textContent=l;document.getElementById('e-p').textContent=ld.pts;
  document.getElementById('end-record').textContent=w+'V — '+d+'P — '+l+'S';
  const badge=document.getElementById('end-mode-badge');
  badge.textContent=gameMode==='scouting'?tr('modePillS'):tr('modePillM');
  badge.style.cssText=gameMode==='scouting'?'background:rgba(56,189,248,.12);color:#7dd3fc':'background:rgba(251,113,133,.15);color:#fda4af';
  if(gameMode==='memoria'){
    document.getElementById('memoria-reveal').style.display='block';
    document.getElementById('reveal-title').textContent=tr('revealTitle');
    const list=document.getElementById('memoria-reveal-list');list.innerHTML='';
    const pl=mySquad.filter(Boolean);
    const avg2=Math.round(pl.reduce((s,p)=>s+p.r,0)/pl.length);
    pl.forEach(p=>{
      const rc=p.r>=90?'r-elite':p.r>=80?'r-good':'r-ok';
      const div=document.createElement('div');
      div.style.cssText='display:flex;align-items:center;gap:.65rem;padding:.45rem .85rem;border-bottom:.5px solid rgba(255,255,255,.06)';
      div.innerHTML=`<span style="font-size:10px;color:rgba(255,255,255,.3);min-width:28px;text-transform:uppercase">${p.pos}</span><span style="flex:1;font-size:12px;font-weight:500">${p.n}</span><span style="font-size:10px;color:rgba(255,255,255,.28)">${p.from}</span><span class="p-rating ${rc}">${p.r}</span>`;
      list.appendChild(div);
    });
    const avgDiv=document.createElement('div');
    avgDiv.style.cssText='display:flex;justify-content:space-between;padding:.45rem .85rem;font-size:11px;color:rgba(255,255,255,.35)';
    avgDiv.innerHTML=`<span>${tr('avgOverall')}</span><span style="font-family:'Bebas Neue',sans-serif;color:var(--gold);font-size:.95rem">${avg2} / 100</span>`;
    list.appendChild(avgDiv);
  }
  const ends=tr('ends');
  let info;
  if(w===38&&d===0&&l===0)info=[ends.perfect[0],ends.perfect[1],ends.perfect[2]+(gameMode==='memoria'?ends.perfMem:'')];
  else if(w>=34&&l===0)info=ends.nearperfect;
  else if(w>=28)info=ends.champion;
  else if(w>=20)info=ends.good;
  else info=gameMode==='memoria'?ends.badMem:ends.bad;
  document.getElementById('end-trophy').textContent=info[0];
  document.getElementById('end-title').textContent=info[1];
  document.getElementById('end-sub').textContent=info[2];

  // ── VOTO ──
  const pts=ld.pts;
  let grade,gradeClass,gradeLbl;
  if(w===38&&d===0&&l===0){grade='S++';gradeClass='grade-spp';gradeLbl='LEGGENDA ASSOLUTA';}
  else if(pts>=110){grade='S+';gradeClass='grade-spp';gradeLbl='STAGIONE IMPOSSIBILE';}
  else if(pts>=100){grade='S';gradeClass='grade-sp';gradeLbl='STAGIONE DA SOGNO';}
  else if(pts>=90){grade='A++';gradeClass='grade-a';gradeLbl='ECCEZIONALE';}
  else if(pts>=80){grade='A+';gradeClass='grade-a';gradeLbl='OTTIMO';}
  else if(pts>=70){grade='A';gradeClass='grade-a';gradeLbl='MOLTO BUONO';}
  else if(pts>=60){grade='B+';gradeClass='grade-b';gradeLbl='BUONO';}
  else if(pts>=50){grade='B';gradeClass='grade-b';gradeLbl='DISCRETO';}
  else if(pts>=40){grade='C';gradeClass='grade-c';gradeLbl='SUFFICIENTE';}
  else if(pts>=30){grade='D';gradeClass='grade-d';gradeLbl='INSUFFICIENTE';}
  else if(pts>=20){grade='E';gradeClass='grade-d';gradeLbl='SCARSO';}
  else{grade='F';gradeClass='grade-f';gradeLbl='DA RIFARE';}
  const gradeEl=document.getElementById('end-grade');
  const gradeLblEl=document.getElementById('end-grade-lbl');
  if(gradeEl){gradeEl.textContent=grade;gradeEl.className='end-grade '+gradeClass;}
  if(gradeLblEl)gradeLblEl.textContent=gradeLbl;
}

// ── RESET ──
function resetGame(){
  mySquad=new Array(11).fill(null);currentTeam=null;tableData=[];slotRerolls=0;dadoLanciato=false;lastTeamName=null;pendingPlayer=null;
  ld={matches:[],gw:1,wins:0,draws:0,losses:0,pts:0};
  document.getElementById('team-reveal-box').style.display='none';
  const rb=document.getElementById('roll-btn');
  rb.style.display='';
  rb.disabled=false;
  dadoLanciato=false;
  document.getElementById('next-area').style.display='';
  document.getElementById('hdr-mode-pill').style.display='none';
  document.getElementById('memoria-reveal').style.display='none';
  show('screen-mode');
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('roll-btn').addEventListener('click', rollDice);
  applyT();
});
</script>
